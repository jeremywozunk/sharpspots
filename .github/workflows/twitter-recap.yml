name: SharpSpots Twitter Recap

# Emails the @sharpspots daily results thread (master post + per-pick breakdowns)
# to RECAP_TO each morning. Generation is automated; you copy/paste into X.
#
# NOTE: GitHub Actions cron is UTC. 10:00 UTC = 6:00 AM EDT (summer) / 5:00 AM EST (winter).
# Adjust the cron below if you want a different ET time in winter.

on:
  schedule:
    - cron: "0 10 * * *"   # 06:00 America/New_York during EDT
  workflow_dispatch:        # lets you run it manually from the Actions tab anytime

jobs:
  send-recap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send recap email
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECAP_TO: ${{ secrets.RECAP_TO }}
        run: python3 scripts/twitter_recap/send_recap_email.py
